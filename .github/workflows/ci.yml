name: CI

# Codifies the manual pre-merge gate (typecheck + lint + tests) so every PR and
# every push to main is checked automatically. No secrets required — these run
# entirely offline (no DB / network). `next build` is intentionally NOT run here:
# it needs runtime env/secrets and is exercised by the Vercel deployment check.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · lint · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm run test

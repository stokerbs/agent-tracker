<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ออฟไลน์ · Detective Pulse</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: hsl(222 47% 6%);
    color: hsl(213 35% 92%);
    font-family: ui-sans-serif, system-ui, "IBM Plex Sans Thai", sans-serif;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    background-image:
      linear-gradient(to right, hsl(220 22% 14% / 0.5) 1px, transparent 1px),
      linear-gradient(to bottom, hsl(220 22% 14% / 0.5) 1px, transparent 1px);
    background-size: 32px 32px;
  }
  .card {
    max-width: 360px; width: 100%; text-align: center;
    border: 1px solid hsl(218 34% 19%);
    border-radius: 14px;
    background: hsl(220 39% 11%);
    padding: 32px 24px;
  }
  .ring {
    width: 64px; height: 64px; margin: 0 auto 18px;
    border-radius: 9999px; position: relative;
    background: hsl(38 78% 56% / 0.12);
    box-shadow: inset 0 0 0 1px hsl(38 78% 56% / 0.3);
    display: flex; align-items: center; justify-content: center;
  }
  .ring svg { color: hsl(38 78% 56%); }
  .eyebrow {
    font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
    font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
    color: hsl(216 18% 62%); margin: 0 0 6px;
  }
  h1 { font-size: 19px; font-weight: 600; margin: 0 0 8px; letter-spacing: -0.01em; }
  p { font-size: 13.5px; line-height: 1.6; color: hsl(216 18% 62%); margin: 0 0 22px; }
  button {
    appearance: none; border: 0; cursor: pointer;
    background: hsl(38 78% 56%); color: hsl(222 47% 7%);
    font-size: 14px; font-weight: 600; font-family: inherit;
    padding: 11px 20px; border-radius: 10px; width: 100%;
  }
  button:active { transform: scale(0.985); }
  .hint { margin-top: 14px; font-size: 11.5px; color: hsl(216 16% 50%); }
</style>
</head>
<body>
  <main class="card">
    <div class="ring" aria-hidden="true">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 20h.01" /><path d="M8.5 16.4a5 5 0 0 1 7 0" /><path d="M5 12.9a10 10 0 0 1 14 0" />
        <path d="M2 8.8a15 15 0 0 1 20 0" /><line x1="2" y1="2" x2="22" y2="22" />
      </svg>
    </div>
    <p class="eyebrow">ศูนย์บัญชาการ</p>
    <h1>ไม่มีการเชื่อมต่อ</h1>
    <p>ขณะนี้อุปกรณ์ออฟไลน์ ตำแหน่ง GPS ที่บันทึกระหว่างไม่มีสัญญาณจะถูกส่งให้อัตโนมัติเมื่อกลับมาออนไลน์</p>
    <button onclick="location.reload()">ลองใหม่อีกครั้ง</button>
    <p class="hint">ระบบจะเชื่อมต่อใหม่เองเมื่อมีสัญญาณ</p>
  </main>
  <script>
    window.addEventListener("online", function () { location.reload(); });
  </script>
</body>
</html>
